name: checkpoint_app
description: Smart Checkpoint Status App for Palestine
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  
  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  google_sign_in: ^6.2.2
  
  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  flutter_map_cache: ^1.4.0
  dio_cache_interceptor: ^3.5.0
  dio_cache_interceptor_hive_store: ^3.2.2
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5
  
  # UI & Utils
  flutter_polyline_points: ^2.1.0
  intl: ^0.20.2
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  shimmer: ^3.0.0
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/google.webp
    - assets/image.png
    - assets/lottie/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/Screenshot 2026-05-10 164116.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/Screenshot 2026-05-10 164116.png"