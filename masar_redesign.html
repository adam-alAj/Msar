<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسار — مراقبة الحواجز</title>
<style>
:root {
  --color-brand-dark: #1b4332;
  --color-brand-mid: #2d6a4f;
  --color-brand-base: #52b788;
  --color-brand-light: #95d5b2;
  --color-brand-pale: #d8f3dc;
  --color-surface: #ffffff;
  --color-surface-alt: #f8faf9;
  --color-border: #e0ede6;
  --color-open: #52b788;
  --color-congested: #f59e0b;
  --color-closed: #ef4444;
  --color-text: #111b17;
  --color-text-muted: #5c7a6a;
  --color-text-inverse: #ffffff;
  --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
  --space-6: 24px; --space-8: 32px;
  --radius-sm: 6px; --radius-md: 12px; --radius-lg: 20px; --radius-pill: 999px;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-nav: 0 1px 4px rgba(0,0,0,0.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'SF Pro Arabic', 'Segoe UI', Tahoma, sans-serif; background: var(--color-surface-alt); color: var(--color-text); direction: rtl; -webkit-font-smoothing: antialiased; }
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:.6} }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

function TopNav() {
  const [spinning, setSpinning] = useState(false);
  const handleRefresh = () => { setSpinning(true); setTimeout(() => setSpinning(false), 600); };

  return (
    <header style={{background:'var(--color-brand-dark)',height:60,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 var(--space-4)',boxShadow:'var(--shadow-nav)',position:'sticky',top:0,zIndex:100}}>
      {/* Zone 1: Identity (RIGHT in RTL) */}
      <div style={{display:'flex',alignItems:'center',gap:'var(--space-3)'}}>
        <div style={{width:32,height:32,borderRadius:'var(--radius-sm)',background:'var(--color-brand-mid)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><path d="M12 2L12 22M12 2L8 6M12 2L16 6"/><circle cx="12" cy="18" r="3" fill="white" stroke="none"/></svg>
        </div>
        <span style={{color:'var(--color-text-inverse)',fontSize:20,fontWeight:700,letterSpacing:'-0.5px'}}>مسار</span>
        <div style={{display:'flex',alignItems:'center',gap:'var(--space-1)',marginRight:'var(--space-2)'}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:'var(--color-brand-base)',animation:'pulse 2s infinite'}}/>
          <span style={{color:'var(--color-brand-light)',fontSize:11,fontWeight:500}}>مُحدَّث الآن</span>
        </div>
      </div>

      {/* Zone 2: Actions (LEFT in RTL) */}
      <div style={{display:'flex',alignItems:'center',gap:0}}>
        <button onClick={handleRefresh} title="تحديث" style={{width:44,height:44,border:'none',background:'transparent',borderRadius:'var(--radius-sm)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background='var(--color-brand-mid)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" style={{animation:spinning?'spin .6s linear':'none'}}><path d="M21 12a9 9 0 11-3-6.7"/><path d="M21 3v5h-5"/></svg>
        </button>
        <div style={{width:1,height:24,background:'rgba(255,255,255,0.2)',margin:'0 var(--space-1)'}}/>
        <button title="الإعدادات" style={{width:44,height:44,border:'none',background:'transparent',borderRadius:'var(--radius-sm)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background='var(--color-brand-mid)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
        <button title="خروج" style={{width:44,height:44,border:'none',background:'transparent',borderRadius:'var(--radius-sm)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background='var(--color-brand-mid)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>
    </header>
  );
}

function SearchRow() {
  const [query, setQuery] = useState('');
  return (
    <div style={{padding:'var(--space-3) var(--space-4)',background:'var(--color-surface)',borderBottom:'1px solid var(--color-border)'}}>
      <div style={{display:'flex',alignItems:'center',background:'var(--color-surface-alt)',border:'1px solid var(--color-border)',borderRadius:'var(--radius-md)',padding:'0 var(--space-3)',height:44}}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-muted)" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="ابحث عن حاجز أو منطقة..." style={{flex:1,border:'none',background:'transparent',padding:'0 var(--space-3)',fontSize:14,color:'var(--color-text)',outline:'none',direction:'rtl',textAlign:'right'}}/>
        {query && <button onClick={()=>setQuery('')} style={{border:'none',background:'transparent',cursor:'pointer',padding:'var(--space-1)',display:'flex'}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-muted)" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>}
      </div>
    </div>
  );
}

function StatusSummary() {
  const items = [
    { label: 'سالك', count: 12, color: 'var(--color-open)' },
    { label: 'أزمة', count: 5, color: 'var(--color-congested)' },
    { label: 'مغلق', count: 3, color: 'var(--color-closed)' },
  ];
  return (
    <div style={{display:'flex',gap:'var(--space-2)',padding:'var(--space-3) var(--space-4)',background:'var(--color-surface)',borderBottom:'1px solid var(--color-border)'}}>
      {items.map(item => (
        <div key={item.label} style={{display:'flex',alignItems:'center',gap:'var(--space-2)',padding:'var(--space-1) var(--space-3)',borderRadius:'var(--radius-pill)',background:`${item.color}15`,border:`1px solid ${item.color}30`}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:item.color}}/>
          <span style={{fontSize:12,fontWeight:600,color:item.color}}>{item.label}</span>
          <span style={{fontSize:13,fontWeight:700,color:item.color}}>{item.count}</span>
        </div>
      ))}
    </div>
  );
}

function ViewToggle({ active, onChange }) {
  return (
    <div style={{display:'flex',justifyContent:'center',padding:'var(--space-3) var(--space-4)'}}>
      <div style={{display:'flex',background:'var(--color-surface)',border:'1px solid var(--color-border)',borderRadius:'var(--radius-pill)',padding:3,boxShadow:'var(--shadow-card)'}}>
        {['الخريطة','القائمة'].map(tab => (
          <button key={tab} onClick={()=>onChange(tab)} style={{padding:'var(--space-2) var(--space-6)',borderRadius:'var(--radius-pill)',border:'none',fontSize:14,fontWeight:600,cursor:'pointer',transition:'all .25s ease-out',background:active===tab?'var(--color-brand-base)':'transparent',color:active===tab?'var(--color-text-inverse)':'var(--color-text-muted)'}}>
            {tab}
          </button>
        ))}
      </div>
    </div>
  );
}

function MapView() {
  return (
    <div style={{position:'relative',height:320,background:'#e8f4ea',margin:'0 var(--space-4)',borderRadius:'var(--radius-md)',overflow:'hidden',border:'1px solid var(--color-border)'}}>
      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--color-text-muted)',fontSize:14}}>خريطة تفاعلية</div>
      {/* Sample markers */}
      {[{x:30,y:40,status:'open',name:'قلنديا'},{x:60,y:55,status:'congested',name:'حوارة'},{x:45,y:75,status:'closed',name:'زعترة'}].map((m,i) => (
        <div key={i} style={{position:'absolute',left:`${m.x}%`,top:`${m.y}%`,transform:'translate(-50%,-100%)'}}>
          <div style={{background:m.status==='open'?'var(--color-open)':m.status==='congested'?'var(--color-congested)':'var(--color-closed)',color:'white',padding:'var(--space-1) var(--space-2)',borderRadius:'var(--radius-sm)',fontSize:11,fontWeight:600,whiteSpace:'nowrap',boxShadow:'0 2px 6px rgba(0,0,0,.2)'}}>{m.name}</div>
          <div style={{width:0,height:0,borderLeft:'6px solid transparent',borderRight:'6px solid transparent',borderTop:`8px solid ${m.status==='open'?'var(--color-open)':m.status==='congested'?'var(--color-congested)':'var(--color-closed)'}`,margin:'0 auto'}}/>
        </div>
      ))}
    </div>
  );
}

function ListView() {
  const checkpoints = [
    { name: 'حاجز قلنديا', region: 'رام الله — القدس', status: 'سالك', statusKey: 'open', time: 'منذ ٣ د' },
    { name: 'حاجز حوارة', region: 'نابلس — جنوب', status: 'أزمة', statusKey: 'congested', time: 'منذ ٧ د' },
    { name: 'حاجز زعترة', region: 'بيت لحم — الخليل', status: 'مغلق', statusKey: 'closed', time: 'منذ ١٢ د' },
    { name: 'حاجز عطارة', region: 'رام الله — شمال', status: 'سالك', statusKey: 'open', time: 'منذ ١ د' },
  ];
  const statusColor = k => k==='open'?'var(--color-open)':k==='congested'?'var(--color-congested)':'var(--color-closed)';

  return (
    <div style={{padding:'var(--space-3) var(--space-4)',display:'flex',flexDirection:'column',gap:'var(--space-3)'}}>
      {checkpoints.map((cp,i) => (
        <div key={i} style={{background:'var(--color-surface)',borderRadius:'var(--radius-md)',padding:'var(--space-4)',boxShadow:'var(--shadow-card)',border:'1px solid var(--color-border)',cursor:'pointer',transition:'transform .15s, box-shadow .15s'}} onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-1px)';e.currentTarget.style.boxShadow='0 4px 12px rgba(0,0,0,.12)'}} onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='var(--shadow-card)'}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
            <div style={{flex:1}}>
              <div style={{fontSize:16,fontWeight:700,color:'var(--color-text)',marginBottom:'var(--space-1)'}}>{cp.name}</div>
              <div style={{fontSize:13,color:'var(--color-text-muted)'}}>{cp.region}</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-start',gap:'var(--space-1)'}}>
              <span style={{fontSize:11,fontWeight:700,padding:'var(--space-1) var(--space-2)',borderRadius:'var(--radius-pill)',background:`${statusColor(cp.statusKey)}18`,color:statusColor(cp.statusKey),letterSpacing:'0.5px'}}>{cp.status}</span>
              <span style={{fontSize:10,color:'var(--color-text-muted)'}}>{cp.time}</span>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

function LegendBar() {
  const items = [
    { icon: '●', label: 'سالك', color: 'var(--color-open)' },
    { icon: '●', label: 'أزمة', color: 'var(--color-congested)' },
    { icon: '●', label: 'مغلق', color: 'var(--color-closed)' },
  ];
  return (
    <div style={{position:'fixed',bottom:0,left:0,right:0,background:'var(--color-surface)',borderTop:'1px solid var(--color-border)',padding:'var(--space-3) var(--space-4)',display:'flex',justifyContent:'center',gap:'var(--space-8)',zIndex:100,boxShadow:'0 -1px 4px rgba(0,0,0,.06)'}}>
      {items.map(item => (
        <div key={item.label} style={{display:'flex',alignItems:'center',gap:'var(--space-2)'}}>
          <span style={{color:item.color,fontSize:14}}>●</span>
          <span style={{fontSize:13,fontWeight:600,color:'var(--color-text)'}}>{item.label}</span>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [view, setView] = useState('القائمة');
  return (
    <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh',background:'var(--color-surface-alt)',paddingBottom:60}}>
      <TopNav/>
      <SearchRow/>
      <StatusSummary/>
      <ViewToggle active={view} onChange={setView}/>
      {view === 'الخريطة' ? <MapView/> : <ListView/>}
      <LegendBar/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
